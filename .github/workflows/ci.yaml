name: CI Build Check

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Build
        run: dotnet build -c Release -o ./build
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Herald-Plugin
          path: ./build/Herald.dll
